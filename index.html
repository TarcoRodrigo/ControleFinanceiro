<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Bolso">
<link rel="manifest" href="manifest.json">
<title>Meu Bolso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-left">
      <span class="app-logo">MB</span>
      <div>
        <div class="header-title" id="header-title">Dashboard</div>
        <div class="header-month" id="header-month"></div>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="changeMonth(-1)">&#8249;</button>
      <button class="icon-btn" onclick="changeMonth(1)">&#8250;</button>
      <button class="icon-btn" onclick="showModal('modal-settings')">⚙</button>
    </div>
  </header>
  <main class="main" id="main-content"></main>
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="navigate('dashboard')" data-page="dashboard"><span class="nav-icon">◈</span><span>Início</span></button>
    <button class="nav-btn" onclick="navigate('transactions')" data-page="transactions"><span class="nav-icon">↕</span><span>Transações</span></button>
    <button class="nav-btn nav-add" onclick="showModal('modal-add-transaction')"><span class="nav-icon-add">+</span></button>
    <button class="nav-btn" onclick="navigate('fixos')" data-page="fixos"><span class="nav-icon">📋</span><span>Fixos</span></button>
    <button class="nav-btn" onclick="navigate('reports')" data-page="reports"><span class="nav-icon">◎</span><span>Relatórios</span></button>
  </nav>
</div>

<!-- ADD TRANSACTION -->
<div class="modal-overlay" id="modal-add-transaction">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-add-title">Nova Transação</h2>
      <button class="modal-close" onclick="hideModal('modal-add-transaction')">×</button>
    </div>
    <div class="modal-body">
      <div class="type-toggle">
        <button class="type-btn active" id="type-expense" onclick="setTransactionType('expense')">Gasto</button>
        <button class="type-btn" id="type-income" onclick="setTransactionType('income')">Receita</button>
      </div>
      <div class="form-group"><label>Descrição</label><input type="text" id="t-desc" placeholder="Ex: Supermercado, Salário..."></div>
      <div class="form-group"><label>Valor</label><input type="text" id="t-valor" inputmode="numeric" placeholder="R$ 0,00"></div>
      <div class="form-row-2">
        <div class="form-group"><label>Categoria</label><select id="t-cat"></select></div>
        <div class="form-group"><label>Conta / Cartão</label><select id="t-conta"></select></div>
      </div>
      <div class="form-group"><label>Data</label><input type="date" id="t-data"></div>
      <div class="form-group" id="parcelas-group" style="display:none">
        <label>Parcelado?</label>
        <div class="form-row-2">
          <select id="t-parcelas">
            <option value="1">À vista</option>
            <option value="2">2x</option><option value="3">3x</option><option value="4">4x</option>
            <option value="5">5x</option><option value="6">6x</option><option value="7">7x</option>
            <option value="8">8x</option><option value="9">9x</option><option value="10">10x</option>
            <option value="11">11x</option><option value="12">12x</option>
          </select>
          <div class="parcela-info" id="parcela-info"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="checkbox-label"><input type="checkbox" id="t-recorrente"><span>Lançar todo mês automaticamente</span></label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-add-transaction')">Cancelar</button>
      <button class="btn-primary" onclick="saveTransaction()">Salvar</button>
    </div>
  </div>
</div>

<!-- CARDS MANAGER -->
<div class="modal-overlay" id="modal-cards">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Cartões e Contas</h2>
      <button class="modal-close" onclick="hideModal('modal-cards')">×</button>
    </div>
    <div class="modal-body">
      <div id="cards-list"></div>
      <hr class="divider">
      <h3 class="sub-title">Adicionar novo</h3>
      <div class="form-group"><label>Nome</label><input type="text" id="c-nome" placeholder="Ex: Nubank, Conta Bradesco..."></div>
      <div class="form-row-2">
        <div class="form-group"><label>Tipo</label>
          <select id="c-tipo">
            <option value="conta">Conta corrente</option>
            <option value="credito">Cartão de crédito</option>
            <option value="debito">Cartão débito</option>
            <option value="pix">Pix / Dinheiro</option>
            <option value="poupanca">Poupança</option>
          </select>
        </div>
        <div class="form-group"><label>Limite (R$)</label><input type="text" id="c-limite" inputmode="numeric" placeholder="R$ 0,00"></div>
      </div>
      <div class="form-row-2">
        <div class="form-group"><label>Dia de fechamento</label><input type="number" id="c-fechamento" placeholder="Ex: 10" min="1" max="31"></div>
        <div class="form-group"><label>Dia de vencimento</label><input type="number" id="c-vencimento" placeholder="Ex: 5" min="1" max="31"></div>
      </div>
      <div class="form-group"><label>Cor</label><div class="color-picker" id="color-picker"></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-cards')">Fechar</button>
      <button class="btn-primary" id="c-save-btn" onclick="saveCard()">Adicionar</button>
    </div>
  </div>
</div>

<!-- CATEGORIES MANAGER -->
<div class="modal-overlay" id="modal-categories">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Categorias</h2>
      <button class="modal-close" onclick="hideModal('modal-categories')">×</button>
    </div>
    <div class="modal-body">
      <div id="categories-list"></div>
      <hr class="divider">
      <h3 class="sub-title">Adicionar / editar categoria</h3>
      <div class="form-row-2">
        <div class="form-group"><label>Nome</label><input type="text" id="cat-nome" placeholder="Ex: Pet, Academia..."></div>
        <div class="form-group"><label>Tipo</label>
          <select id="cat-tipo">
            <option value="expense">Gasto</option>
            <option value="income">Receita</option>
            <option value="both">Ambos</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Ícone</label><div class="emoji-picker" id="emoji-picker"></div></div>
      <div class="form-group">
        <label class="checkbox-label"><input type="checkbox" id="cat-recorrente"><span>Recorrente por padrão</span></label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-categories')">Fechar</button>
      <button class="btn-primary" id="cat-save-btn" onclick="saveCategory()">Adicionar</button>
    </div>
  </div>
</div>

<!-- BUDGET MANAGER -->
<div class="modal-overlay" id="modal-budget">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Orçamento Mensal</h2>
      <button class="modal-close" onclick="hideModal('modal-budget')">×</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">Defina quanto quer gastar por categoria neste mês.</p>
      <div id="budget-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="saveBudgets();hideModal('modal-budget')">Salvar</button>
    </div>
  </div>
</div>

<!-- GOALS MODAL -->
<div class="modal-overlay" id="modal-add-goal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Nova Meta</h2>
      <button class="modal-close" onclick="hideModal('modal-add-goal')">×</button>
    </div>
    <div class="modal-body">
      <div class="type-toggle">
        <button class="type-btn active" id="goal-type-monthly" onclick="setGoalType('monthly')">Mensal</button>
        <button class="type-btn" id="goal-type-total" onclick="setGoalType('total')">Total</button>
      </div>
      <div class="form-group"><label>Nome da meta</label><input type="text" id="g-nome" placeholder="Ex: Viagem, Reserva de emergência..."></div>
      <div class="form-group"><label id="g-valor-label">Valor mensal a economizar</label><input type="text" id="g-valor" inputmode="numeric" placeholder="R$ 0,00"></div>
      <div class="form-group" id="g-total-group" style="display:none"><label>Valor total a atingir</label><input type="text" id="g-total" inputmode="numeric" placeholder="R$ 0,00"></div>
      <div class="form-group"><label>Ícone</label><div class="emoji-picker" id="goal-emoji-picker"></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-add-goal')">Cancelar</button>
      <button class="btn-primary" onclick="saveGoal()">Salvar</button>
    </div>
  </div>
</div>

<!-- ADD FIXO -->
<div class="modal-overlay" id="modal-add-fixo">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Novo Gasto Fixo</h2>
      <button class="modal-close" onclick="hideModal('modal-add-fixo')">×</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">Só entra nos seus gastos após confirmar o pagamento.</p>
      <div class="form-group"><label>Nome</label><input type="text" id="fx-nome" placeholder="Ex: Aluguel, Internet, Academia..."></div>
      <div class="form-group"><label>Valor</label><input type="text" id="fx-valor" inputmode="numeric" placeholder="R$ 0,00"></div>
      <div class="form-row-2">
        <div class="form-group"><label>Categoria</label><select id="fx-cat"></select></div>
        <div class="form-group"><label>Conta / Cartão</label><select id="fx-conta"></select></div>
      </div>
      <div class="form-group"><label>Dia de vencimento todo mês</label><input type="number" id="fx-dia" placeholder="Ex: 10" min="1" max="31"></div>
      <div class="form-group">
        <label>Tipo</label>
        <div class="type-toggle">
          <button class="type-btn active" id="fx-tipo-recorrente" onclick="setFixoTipo('recorrente')">Recorrente mensal</button>
          <button class="type-btn" id="fx-tipo-parcelado" onclick="setFixoTipo('parcelado')">Parcelado</button>
        </div>
      </div>
      <div id="fx-parcelas-group" style="display:none">
        <div class="form-row-2">
          <div class="form-group"><label>Parcela atual</label><input type="number" id="fx-parcela-atual" placeholder="Ex: 2" min="1"></div>
          <div class="form-group"><label>Total de parcelas</label><input type="number" id="fx-total-parcelas" placeholder="Ex: 10" min="1"></div>
        </div>
        <div class="parcela-info" id="fx-parcela-info" style="font-size:12px;color:var(--amber);margin-top:-8px;margin-bottom:8px"></div>
      </div>
      <input type="hidden" name="fx-tipo" id="fx-tipo-val" value="recorrente">
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="hideModal('modal-add-fixo')">Cancelar</button>
      <button class="btn-primary" onclick="saveFixo()">Salvar</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Configurações</h2>
      <button class="modal-close" onclick="hideModal('modal-settings')">×</button>
    </div>
    <div class="modal-body">
      <div class="settings-list">
        <button class="settings-item" onclick="hideModal('modal-settings');showModal('modal-cards')"><span>💳</span><span>Cartões e Contas</span><span class="settings-arrow">›</span></button>
        <button class="settings-item" onclick="hideModal('modal-settings');showModal('modal-categories')"><span>🏷️</span><span>Categorias</span><span class="settings-arrow">›</span></button>
        <button class="settings-item" onclick="hideModal('modal-settings');showModal('modal-budget')"><span>📊</span><span>Orçamento Mensal</span><span class="settings-arrow">›</span></button>
        <button class="settings-item" onclick="hideModal('modal-settings');navigate('goals')"><span>🎯</span><span>Metas</span><span class="settings-arrow">›</span></button>
        <hr class="divider">
        <button class="settings-item danger" onclick="confirmClearData()"><span>🗑️</span><span>Limpar todos os dados</span><span class="settings-arrow">›</span></button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
